<!-- @startingPoint section="여운 App" subtitle="사주 데이팅 앱 — 전체 클릭형 프로토타입 (iPhone 13/14)" viewport="430x884" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>여운 App</title>
<link rel="stylesheet" href="styles.css" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--color-natural-100); font-family: var(--font-family-base); display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
  /* iPhone 13 / 14 — 390 × 844 pt logical screen */
  .phone { position: relative; width: 390px; height: 844px; background: var(--color-surface-card); border-radius: 55px; box-shadow: 0 24px 70px rgba(34,32,28,0.28); border: 11px solid #1A1814; }
  .screen-wrap { position: absolute; inset: 0; border-radius: 44px; overflow: hidden; }
  /* device notch */
  .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 158px; height: 30px; background: #1A1814; border-radius: 0 0 18px 18px; z-index: 40; }
  .app-shell { position: absolute; inset: 0; }
  .tabbar-slot { position: absolute; left: 0; right: 0; bottom: 0; background: var(--color-surface-card); padding-bottom: 22px; }
  .toast { position: absolute; left: 50%; bottom: 108px; transform: translateX(-50%); background: var(--color-natural-900); color: #fff; padding: 12px 18px; border-radius: 999px; font-size: 13px; font-weight: 500; box-shadow: var(--shadow-pop); white-space: nowrap; z-index: 50; animation: toastin var(--duration-base) var(--ease-emphasis); display: flex; align-items: center; gap: 7px; }
  @keyframes toastin { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
  /* hide scrollbars — real mobile has no visible track */
  .screen-wrap, .screen-wrap * { scrollbar-width: none; -ms-overflow-style: none; }
  .screen-wrap *::-webkit-scrollbar { width: 0; height: 0; display: none; }
</style>
</head>
<body>
<div class="phone">
  <div class="screen-wrap"><div id="root"></div></div>
  <div class="notch"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds_bundle.js"></script>
<script src="AppData.js"></script>
<script type="text/babel" src="AppScreens.jsx"></script>
<script type="text/babel" src="AppScreens2.jsx"></script>
<script type="text/babel" src="Onboarding.jsx"></script>
<script type="text/babel">
const { BottomTabBar, Icon } = window.YuonDesignSystem_8624c6;

// iOS status bar — 47px safe area (iPhone 13/14). Per UI가이드 화면 가이드.
function StatusBar({ light }) {
  const fg = light ? '#fff' : 'var(--color-natural-900)';
  return (
    <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 47, zIndex: 30,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 30px 0 34px',
      pointerEvents: 'none', fontFamily: 'var(--font-family-base)' }}>
      <span style={{ fontSize: 16, fontWeight: 700, color: fg, letterSpacing: '0.01em', marginTop: 2 }}>9:41</span>
      <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginTop: 2 }}>
        {/* signal */}
        <div style={{ display: 'flex', alignItems: 'flex-end', gap: 2, height: 11 }}>
          {[4, 6, 8, 11].map((h, i) => <div key={i} style={{ width: 3, height: h, borderRadius: 1, background: fg }} />)}
        </div>
        {/* wifi */}
        <div style={{ position: 'relative', width: 16, height: 12 }}>
          {[12, 8, 4].map((s, i) => (
            <div key={i} style={{ position: 'absolute', left: '50%', bottom: 0, transform: 'translateX(-50%)',
              width: s, height: s, border: `2px solid ${fg}`, borderRadius: '50%',
              clipPath: 'polygon(0 0, 100% 0, 50% 55%)', opacity: 0.95 }} />
          ))}
          <div style={{ position: 'absolute', left: '50%', bottom: 0, transform: 'translateX(-50%)', width: 3, height: 3, borderRadius: '50%', background: fg }} />
        </div>
        {/* battery */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 1 }}>
          <div style={{ width: 23, height: 12, borderRadius: 3, border: `1.5px solid ${fg}`, opacity: 0.5, padding: 1, boxSizing: 'border-box' }}>
            <div style={{ width: '78%', height: '100%', borderRadius: 1, background: fg }} />
          </div>
          <div style={{ width: 2, height: 4, borderRadius: 1, background: fg, opacity: 0.5 }} />
        </div>
      </div>
    </div>
  );
}

function HomeIndicator({ light }) {
  return (
    <div style={{ position: 'absolute', bottom: 8, left: 0, right: 0, height: 5, display: 'flex', justifyContent: 'center', zIndex: 30, pointerEvents: 'none' }}>
      <div style={{ width: 134, height: 5, borderRadius: 3, background: light ? 'rgba(255,255,255,0.9)' : 'var(--color-natural-900)' }} />
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState('home');         // home | heart | chat | my
  const [stack, setStack] = React.useState([]);          // [{route, params}]
  const [authed, setAuthed] = React.useState(false);
  const [onboarding, setOnboarding] = React.useState(false);
  const [locationMode, setLocationMode] = React.useState(false);
  const [saved, setSaved] = React.useState({});
  const [toast, setToast] = React.useState(null);

  const top = stack[stack.length - 1];
  const push = (route, params) => setStack((s) => [...s, { route, params }]);
  const pop = () => setStack((s) => s.slice(0, -1));
  const showToast = (msg, icon) => { setToast({ msg, icon }); clearTimeout(window.__yt); window.__yt = setTimeout(() => setToast(null), 1900); };

  if (onboarding) {
    return (<><OnboardingFlow onComplete={() => { setOnboarding(false); setAuthed(true); }} onExit={() => setOnboarding(false)} /><StatusBar /><HomeIndicator /></>);
  }
  if (!authed) {
    return (<><LoginScreen onSignup={() => setOnboarding(true)} onLogin={() => setAuthed(true)} /><StatusBar light /><HomeIndicator light /></>);
  }

  let body, hideTabbar = false, immersive = false;
  if (top && top.route === 'profile') {
    hideTabbar = true; immersive = true;
    const isSaved = !!saved[top.params.id];
    body = <ProfileDetailScreen profileId={top.params.id} onBack={pop} savedQuiet={isSaved}
      onQuiet={() => { setSaved((s) => ({ ...s, [top.params.id]: !s[top.params.id] })); showToast(isSaved ? '마음함에서 꺼냈어요' : '마음에 담았어요 · 상대에게 알림은 가지 않아요', 'heart'); }}
      onInterest={() => { showToast('관심을 표현했어요 · 상대에게 알림을 보냈어요', 'heart'); }} />;
  } else if (top && top.route === 'chatroom') {
    hideTabbar = true;
    body = <ChatRoomScreen chatId={top.params.id} onBack={pop} />;
  } else if (tab === 'home') {
    body = <HomeScreen onOpenProfile={(id) => push('profile', { id })} />;
  } else if (tab === 'heart') {
    body = <HeartScreen onOpenProfile={(id) => push('profile', { id })} />;
  } else if (tab === 'chat') {
    body = <ChatListScreen onOpenChat={(id) => push('chatroom', { id })} onOpenProfile={(id) => push('profile', { id })} />;
  } else {
    body = <MyPageScreen />;
  }

  const topInset = immersive ? 0 : 47;       // status bar safe area
  const bottomInset = hideTabbar ? 0 : (64 + 22); // tab bar + home-indicator safe area

  return (
    <div className="app-shell">
      <div style={{ position: 'absolute', left: 0, right: 0, top: topInset, bottom: bottomInset }}>
        {body}
      </div>
      {!hideTabbar && (
        <div className="tabbar-slot">
          <BottomTabBar active={tab} onChange={(k) => { setStack([]); setTab(k); }} badges={{ chat: true }} showLabels={false} />
        </div>
      )}
      {toast && (
        <div className="toast">
          {toast.icon && <Icon name={toast.icon} size={15} color="var(--color-accent-400)" filled />}
          {toast.msg}
        </div>
      )}
      <StatusBar light={immersive} />
      <HomeIndicator light={immersive} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
