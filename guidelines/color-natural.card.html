<!-- @dsCard group="Colors" viewport="700x150" name="Natural — Warm Gray" subtitle="텍스트 · 구조 · 배경 서피스 (Core 500)" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--color-surface-card); font-family: var(--font-family-base); }
  .scale { display: flex; gap: 6px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.04); }
  .k { font-size: 10px; color: var(--color-text-meta); margin-top: 6px; }
  .h { font-size: 10px; color: var(--color-text-tertiary); }
  .core { outline: 2px solid var(--color-natural-900); outline-offset: 2px; border-radius: 9px; }
</style></head>
<body>
<div class="scale">
  <div class="sw"><div class="chip" style="background:var(--color-natural-50)"></div><div class="k">50</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-natural-100)"></div><div class="k">100</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-natural-200)"></div><div class="k">200</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-natural-300)"></div><div class="k">300</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-natural-400)"></div><div class="k">400</div></div>
  <div class="sw"><div class="chip core" style="background:var(--color-natural-500)"></div><div class="k">500</div><div class="h">#9E9488</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-natural-600)"></div><div class="k">600</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-natural-700)"></div><div class="k">700</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-natural-800)"></div><div class="k">800</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-natural-900)"></div><div class="k">900</div></div>
</div>
</body></html>
