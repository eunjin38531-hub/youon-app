<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="sm 8 · md 12 · lg 16 · xl 20 · 2xl 24 · pill" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--color-surface-card); font-family: var(--font-family-base); display: flex; gap: 16px; align-items: flex-start; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 64px; background: var(--color-primary-100); border: 1.5px solid var(--color-primary-300); }
  .k { font-size: 10px; color: var(--color-text-meta); }
</style></head>
<body>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="k">sm · 8</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="k">md · 12</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="k">lg · 16</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="k">xl · 20</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="k">2xl · 24</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="k">pill</div></div>
</body></html>
