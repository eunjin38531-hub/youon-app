<!-- @dsCard group="Colors" viewport="700x150" name="Primary — Teal" subtitle="신뢰 · 인증 · 궁합 점수 · 핵심 포인트 (Core 500)" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--color-surface-card); font-family: var(--font-family-base); }
  .scale { display: flex; gap: 6px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: 8px; }
  .k { font-size: 10px; color: var(--color-text-meta); margin-top: 6px; }
  .h { font-size: 10px; color: var(--color-text-tertiary); }
  .core { outline: 2px solid var(--color-natural-900); outline-offset: 2px; border-radius: 9px; }
</style></head>
<body>
<div class="scale">
  <div class="sw"><div class="chip" style="background:var(--color-primary-50)"></div><div class="k">50</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-primary-100)"></div><div class="k">100</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-primary-200)"></div><div class="k">200</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-primary-300)"></div><div class="k">300</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-primary-400)"></div><div class="k">400</div></div>
  <div class="sw"><div class="chip core" style="background:var(--color-primary-500)"></div><div class="k">500</div><div class="h">#5AC7C4</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-primary-600)"></div><div class="k">600</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-primary-700)"></div><div class="k">700</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-primary-800)"></div><div class="k">800</div></div>
  <div class="sw"><div class="chip" style="background:var(--color-primary-900)"></div><div class="k">900</div></div>
</div>
</body></html>
