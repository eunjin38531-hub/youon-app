<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows" subtitle="웜 톤 그림자 (Natural/900 캐스트) — xs · sm · card · pop" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px; background: var(--color-surface-page); font-family: var(--font-family-base); display: flex; gap: 24px; align-items: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 92px; height: 70px; background: var(--color-surface-card); border-radius: 14px; }
  .k { font-size: 11px; color: var(--color-text-meta); }
</style></head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="k">xs</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="k">sm</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-card)"></div><div class="k">card</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-pop)"></div><div class="k">pop</div></div>
</body></html>
