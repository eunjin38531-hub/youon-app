<!-- @dsCard group="Brand" viewport="700x300" name="Mascot — 여웅" subtitle="브랜드 마스코트. 이마의 초승달 · 민트 후디 · 폰을 든 붉은여우" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px; background: var(--color-surface-card); font-family: var(--font-family-base); display: flex; gap: 28px; align-items: center; }
  .tile { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; border-radius: 20px; padding: 18px 28px; }
  .onlight { background: var(--color-surface-page); border: 1px solid var(--color-border-default); }
  .onteal { background: linear-gradient(168deg, var(--color-primary-600), var(--color-primary-400)); }
  .cap { font-size: 12px; font-weight: 500; color: var(--color-text-tertiary); }
  .onteal .cap { color: rgba(255,255,255,0.9); }
  .meta { flex: 1; }
  .meta h3 { margin: 0 0 8px; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; color: var(--color-text-primary); }
  .meta p { margin: 0; font-size: 13px; line-height: 1.6; color: var(--color-text-meta); }
  .traits { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .traits span { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; background: var(--color-primary-50); color: var(--color-primary-700); }
</style></head>
<body>
  <div class="tile onlight">
    <img src="../assets/mascot/yeowoong.png" alt="여웅 마스코트" style="height:200px;object-fit:contain" />
    <span class="cap">on light</span>
  </div>
  <div class="tile onteal">
    <img src="../assets/mascot/yeowoong.png" alt="여웅 마스코트" style="height:200px;object-fit:contain" />
    <span class="cap">on brand</span>
  </div>
  <div class="meta">
    <h3>여웅 (Yeowoong)</h3>
    <p>여운의 마스코트. 사주의 신비로움(이마의 초승달)과 따뜻함을 담은 붉은여우. 브랜드 민트 후디를 입고 폰으로 인연을 잇는 모습이에요.</p>
    <div class="traits"><span>진실한</span><span>신비로운</span><span>따뜻한</span><span>끌리는</span></div>
  </div>
</body></html>
