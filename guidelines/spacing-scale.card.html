<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale — 8pt grid" subtitle="4px half-step · 16px 기본 화면 패딩" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--color-surface-card); font-family: var(--font-family-base); display: flex; gap: 14px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--color-primary-300); border-radius: 4px; width: 28px; }
  .k { font-size: 10px; color: var(--color-text-meta); }
</style></head>
<body>
  <div class="col"><div class="bar" style="height:4px"></div><div class="k">1 · 4</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="k">2 · 8</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="k">3 · 12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="k">4 · 16</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="k">6 · 24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="k">8 · 32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="k">12 · 48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="k">16 · 64</div></div>
</body></html>
