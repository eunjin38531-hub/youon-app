<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />

</style></head>
<body>
  <p class="mission">진짜 사람과, 이유 있는 만남을</p>
  <p class="sub">사주 기반 데이팅 — 검증된 신뢰와 따뜻한 인연</p>
  <div class="tags">
    <span class="tag">진실한</span>
    <span class="tag">신비로운</span>
    <span class="tag">따뜻한</span>
    <span class="tag">끌리는</span>
