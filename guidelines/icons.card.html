<!-- @dsCard group="Brand" viewport="700x220" name="Icons" subtitle="브랜드 라인 아이콘 (실 아트워크, mask로 색상 변경) + 인증 배지" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px; background: var(--color-surface-card); font-family: var(--font-family-base); }
  .row { display: flex; flex-wrap: wrap; gap: 26px; align-items: flex-start; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 62px; }
  .cell .cap { font-size: 11px; color: var(--color-text-tertiary); }
  .grp { display: flex; flex-direction: column; gap: 10px; }
  .grp .lbl { font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--color-text-tertiary); }
</style></head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<script type="text/babel">
const { Icon } = window.YuonDesignSystem_8624c6;
const BRAND = [['home','home'],['heart','heart'],['chat','chat'],['user','user'],['chevronLeft','chevronLeft'],['mapPin','mapPin']];
function Cell({ name, label, color }) {
  return (<div className="cell"><Icon name={name} size={28} color={color} /><span className="cap">{label}</span></div>);
}
function Demo() {
  return (
    <div className="row">
      <div className="grp">
        <span className="lbl">Brand icons — 실 아트워크 (default · teal · coral)</span>
        <div className="row">{BRAND.map(([n,l]) => <Cell key={n} name={n} label={l} color="var(--color-text-primary)" />)}</div>
        <div className="row">{BRAND.map(([n,l]) => <Cell key={n} name={n} label="" color="var(--color-primary-500)" />)}</div>
      </div>
      <div className="grp">
        <span className="lbl">인증 배지</span>
        <Cell name="badgeCheck" label="badgeCheck" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body></html>
